<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Philosophy</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Pretendard',sans-serif;
  background:#001a33;
  color:#ffffff;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

canvas{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:-1;
}

.container{
  max-width:720px;
  padding:40px;
}

h1{
  font-size:52px;
  font-weight:600;
  line-height:1.3;
  margin-bottom:40px;
}

.typing{
  border-right:3px solid #ff3b3b;
  padding-right:6px;
  white-space:pre-wrap;
  animation: blink .7s infinite;
}

@keyframes blink{
  0%,100%{border-color:transparent}
  50%{border-color:#ff3b3b}
}

p{
  font-size:17px;
  line-height:2;
  color:rgba(255,255,255,0.85);
  margin-bottom:28px;
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp .8s ease forwards;
}

p:nth-of-type(1){animation-delay:3.5s}
p:nth-of-type(2){animation-delay:3.8s}
p:nth-of-type(3){animation-delay:4.1s}
p:nth-of-type(4){animation-delay:4.4s}
p:nth-of-type(5){animation-delay:4.7s}

.highlight{color:#ff3b3b}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>
<canvas id="bg"></canvas>

<div class="container">
<h1 class="typing" id="typing"></h1>

<p>내가 생각하는 디자인은 단순한 시각적 결과물이 아니라 <span class="highlight">의도와 구조가 자연스럽게 드러나는 흐름</span>이다.</p>
<p>사용자는 그것을 의식하지 않지만 이미 그 안에서 경험하고 있어야 한다.</p>
<p>나는 불필요한 요소를 덜어내고 최소한의 형태로 본질을 남긴다.</p>
<p>그리드와 타이포그래피는 <span class="highlight">질서를 만드는 도구</span>다.</p>
<p>결국 내가 추구하는 디자인은 <span class="highlight">보이지 않지만 작동하는 것</span>이다.</p>
</div>

<script>
/* typing */
const text = "좋은 디자인은\n설명하지 않아도\n이해된다";
const target = document.getElementById('typing');
let i = 0;
function type(){
  if(i < text.length){
    target.innerHTML += text[i] === "\n" ? "<br>" : text[i];
    i++;
    setTimeout(type, 70);
  }
}
setTimeout(type, 300);

/* canvas */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = {x: canvas.width/2, y: canvas.height/2};
let prevMouse = {...mouse};

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

let bubbles = [];
for(let i=0;i<35;i++){
  bubbles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*30 + 20,
    vx: (Math.random()-0.5)*2,
    vy: (Math.random()-0.5)*2
  });
}

let waves = [];

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // create ripple on fast movement
  let speed = Math.hypot(mouse.x - prevMouse.x, mouse.y - prevMouse.y);
  if(speed > 5){
    waves.push({x: mouse.x, y: mouse.y, r: 0, alpha: 1});
  }

  // draw waves
  waves.forEach((w,i)=>{
    w.r += 3;
    w.alpha *= 0.96;

    ctx.beginPath();
    ctx.arc(w.x, w.y, w.r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(0,150,255,${w.alpha})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    if(w.alpha < 0.05) waves.splice(i,1);
  });

  // bubbles
  bubbles.forEach(b=>{
    let dx = b.x - mouse.x;
    let dy = b.y - mouse.y;
    let dist = Math.hypot(dx,dy);

    if(dist < 200){
      b.vx += dx * 0.02;
      b.vy += dy * 0.02;
    }

    b.vx *= 0.96;
    b.vy *= 0.96;

    b.x += b.vx;
    b.y += b.vy;

    // iridescent effect
    let grad = ctx.createRadialGradient(b.x, b.y, b.r*0.2, b.x, b.y, b.r);
    grad.addColorStop(0, 'rgba(255,255,255,0.6)');
    grad.addColorStop(0.3, 'rgba(0,200,255,0.3)');
    grad.addColorStop(0.6, 'rgba(255,0,150,0.2)');
    grad.addColorStop(1, 'rgba(0,0,255,0.1)');

    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.stroke();
  });

  prevMouse.x = mouse.x;
  prevMouse.y = mouse.y;

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
