<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Philosophy</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Pretendard',sans-serif;
  background:#f6f1e8;
  color:#1a1a1a;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

canvas{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:-1;
}

.container{
  max-width:720px;
  padding:40px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

h1{
  font-size:52px;
  font-weight:600;
  line-height:1.3;
  margin-bottom:40px;
  letter-spacing:-1px;
}

.typing{
  border-right:3px solid #ff2d2d;
  padding-right:6px;
  white-space:pre-wrap;
  animation: blink .7s infinite;
}

@keyframes blink{
  0%,100%{border-color:transparent}
  50%{border-color:#ff2d2d}
}

p{
  font-size:17px;
  line-height:2.1;
  color:#333;
  margin-bottom:32px;
  max-width:620px;
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp .8s ease forwards;
}

p:nth-of-type(1){animation-delay:3.5s}
p:nth-of-type(2){animation-delay:3.8s}
p:nth-of-type(3){animation-delay:4.1s}
p:nth-of-type(4){animation-delay:4.4s}
p:nth-of-type(5){animation-delay:4.7s}

.highlight{
  color:#ff2d2d;
}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0)}
}

</style>
</head>

<body>
<canvas id="bg"></canvas>

<div class="container">

</html>
